spring:
  application:
    name: consumer

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: shutdown
  endpoint:
    shutdown:
      access: unrestricted
